<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖北QoC平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-primary: #050810;
            --bg-secondary: #0a0f1a;
            --bg-tertiary: #0d1526;
            --bg-card: rgba(10, 20, 40, 0.8);
            --border-color: rgba(0, 200, 255, 0.15);
            --border-glow: rgba(0, 200, 255, 0.4);
            --text-primary: #e8f4ff;
            --text-secondary: #7aa2cc;
            --text-muted: #4a6a8a;
            --accent-cyan: #00d4ff;
            --accent-blue: #0088ff;
            --accent-purple: #a855f7;
            --accent-green: #00ff88;
            --accent-yellow: #ffd000;
            --accent-red: #ff3366;
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-cyan), transparent 50%);
            opacity: 0.5;
        }

        .logo {
            padding: 28px 24px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .logo span {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-section {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .nav-section:last-child {
            border-bottom: none;
        }

        .nav-section-title {
            padding: 10px 24px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }

        .nav-section-title:hover {
            color: var(--accent-cyan);
        }

        .nav-items {
            display: none;
            padding: 8px 16px;
        }

        .nav-section.expanded .nav-items {
            display: block;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            margin-bottom: 4px;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--accent-cyan);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s;
            box-shadow: var(--glow-cyan);
        }

        .nav-item:hover {
            background: rgba(0, 212, 255, 0.08);
            color: var(--text-primary);
        }

        .nav-item:hover::before {
            height: 60%;
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), rgba(0, 136, 255, 0.08));
            color: var(--accent-cyan);
        }

        .nav-item.active::before {
            height: 100%;
        }

        .nav-item .icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item .icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .badge {
            margin-left: auto;
            background: linear-gradient(135deg, var(--accent-red), #ff6688);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(255, 51, 102, 0.3);
        }

        .main-wrapper {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            height: 72px;
            background: linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            opacity: 0.3;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-left h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .user-menu {
            position: relative;
        }

        .user-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-trigger:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
        }

        .user-trigger svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-muted);
            transition: transform 0.3s;
        }

        .user-menu.open .user-trigger svg:last-child {
            transform: rotate(180deg);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .user-role {
            font-size: 11px;
            color: var(--text-muted);
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 200px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            z-index: 200;
        }

        .user-menu.open .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
        }

        .dropdown-item svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .dropdown-item:hover {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
        }

        .dropdown-item.danger {
            color: var(--accent-red);
        }

        .dropdown-item.danger:hover {
            background: rgba(255, 51, 102, 0.1);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-color);
            margin: 8px 0;
        }

        .content-frame {
            flex: 1;
            padding: 0;
        }

        .content-frame iframe {
            width: 100%;
            height: calc(100vh - 72px);
            border: none;
            background: var(--bg-primary);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-wrapper {
                margin-left: 0;
            }
        }
    </style>
</head>

    <script>
        const PAGE_CONFIG = {
            'module.html': { title: '监控仪表盘', subtitle: '实时监测 · 数据分析 · 预警处置' },
            'module1.html': { title: 'OLT协同适配分析', subtitle: '终端与设备分析' },
            'module2.html': { title: 'CDN业务质量与流量分析', subtitle: '业务质量分析' },
            'module3.html': { title: 'OLT隐患监测与地市派单整治', subtitle: '终端与设备分析' },
            'module4.html': { title: '光宽智能溯源优化', subtitle: '故障处理' },
            'module5.html': { title: 'OLT"1-5-10"快速处置能力提升', subtitle: '终端与设备分析' },
            'module6.html': { title: '业务不可用时长精准诊断', subtitle: '业务质量分析' },
            'module7.html': { title: '家庭内网故障特征库构建', subtitle: '故障处理' },
            'module8.html': { title: '城域网时延数字孪生构建', subtitle: '网络优化' },
            'module9.html': { title: '网络不稳定溯源整治', subtitle: '故障处理' },
            'module10.html': { title: '用户网络满意度优化', subtitle: '网络优化' }
        };

        function updateUserInfo() {
            const userData = localStorage.getItem('qoc_user');
            if (userData) {
                const user = JSON.parse(userData);
                document.getElementById('userAvatar').textContent = user.avatar;
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userRole').textContent = user.title;
            }
        }

        function updateHeader(page) {
            const config = PAGE_CONFIG[page] || PAGE_CONFIG['module.html'];
            document.getElementById('page-title').textContent = config.title;
            document.getElementById('page-subtitle').textContent = config.subtitle + ' · ' + ['实时监测', '数据分析', '预警处置'][Math.floor(Math.random() * 3)];
        }

        function updateActiveNavItem(link) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (link) {
                link.classList.add('active');
            }
        }

        document.querySelectorAll('.nav-item').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href) {
                    updateHeader(href);
                    updateActiveNavItem(this);
                }
            });
        });

        document.querySelectorAll('.nav-section-title').forEach(title => {
            title.addEventListener('click', function() {
                this.parentElement.classList.toggle('expanded');
            });
        });

        const userMenu = document.getElementById('userMenu');
        const userTrigger = document.getElementById('userTrigger');

        userTrigger.addEventListener('click', function(e) {
            e.stopPropagation();
            userMenu.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            if (!userMenu.contains(e.target)) {
                userMenu.classList.remove('open');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('qoc_user');
            window.location.href = 'login.html';
        });

        const defaultPage = 'module.html';
        updateHeader(defaultPage);
        updateUserInfo();

        const currentPage = window.location.search.match(/page=([^&]+)/);
        if (currentPage) {
            const page = decodeURIComponent(currentPage[1]);
            const link = document.querySelector(`.nav-item[href="${page}"]`);
            if (link) {
                updateActiveNavItem(link);
                document.getElementById('contentFrame').src = page;
                updateHeader(page);
            }
        }
    </script>
