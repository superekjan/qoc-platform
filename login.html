<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 湖北QoC平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050810;
            --bg-secondary: #0a0f1a;
            --bg-tertiary: #0d1526;
            --bg-card: rgba(10, 20, 40, 0.8);
            --bg-card-hover: rgba(15, 30, 60, 0.9);
            --border-color: rgba(0, 200, 255, 0.15);
            --border-glow: rgba(0, 200, 255, 0.4);
            --text-primary: #e8f4ff;
            --text-secondary: #7aa2cc;
            --text-muted: #4a6a8a;
            --accent-cyan: #00d4ff;
            --accent-blue: #0088ff;
            --accent-purple: #a855f7;
            --accent-green: #00ff88;
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .login-left {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            overflow: hidden;
        }
        .login-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        .brand {
            position: relative;
            z-index: 1;
        }
        .brand h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .brand p {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .brand-features {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feature-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--accent-cyan);
            stroke-width: 1.5;
            fill: none;
        }
        .feature-text h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .feature-text p {
            font-size: 12px;
            color: var(--text-muted);
        }
        .login-right {
            width: 520px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
        }
        .login-right::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--accent-cyan), transparent);
            opacity: 0.3;
        }
        .login-box {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h3 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        .role-option {
            flex: 1;
            padding: 16px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .role-option:hover {
            border-color: var(--border-glow);
            background: var(--bg-card-hover);
        }
        .role-option.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }
        .role-option svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            fill: none;
            transition: all 0.3s;
        }
        .role-option.active svg {
            stroke: var(--accent-cyan);
        }
        .role-option span {
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .role-option.active span {
            color: var(--accent-cyan);
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }
        .input-wrapper svg {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            fill: none;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .password-toggle svg {
            position: static;
            width: 18px;
            height: 18px;
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-cyan);
        }
        .remember-me span {
            font-size: 12px;
            color: var(--text-muted);
        }
        .forgot-link {
            font-size: 12px;
            color: var(--accent-cyan);
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .login-btn:hover::before {
            left: 100%;
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .demo-accounts {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }
        .demo-accounts p {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 12px;
        }
        .demo-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .demo-item {
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .demo-item:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.05);
        }
        .demo-role {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .demo-account {
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="login-left">
        <div class="brand">
            <h1>HUBEI QoC</h1>
            <p>城域网质量分析系统</p>
        </div>
        <div class="brand-features">
            <div class="feature-item">
                <div class="feature-icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
                <div class="feature-text"><h3>实时监控</h3><p>全网OLT设备、光猫终端状态实时监测</p></div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                <div class="feature-text"><h3>智能预警</h3><p>AI驱动的问题诊断与预警分析</p></div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div class="feature-text"><h3>快速处置</h3><p>1510快速响应机制提升运维效率</p></div>
            </div>
        </div>
    </div>
    <div class="login-right">
        <div class="login-box">
            <div class="login-header">
                <h3>欢迎回来</h3>
                <p>请选择您的角色并登录系统</p>
            </div>
            <div class="role-selector">
                <button class="role-option active" data-role="admin">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span>管理员</span>
                </button>
                <button class="role-option" data-role="operator">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span>运维人员</span>
                </button>
                <button class="role-option" data-role="viewer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>查看者</span>
                </button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="请输入密码">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>
            <div class="demo-accounts">
                <p>演示账号</p>
                <div class="demo-list">
                    <div class="demo-item" onclick="fillDemo('admin')">
                        <span class="demo-role">管理员</span>
                        <span class="demo-account">admin / admin123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }
        function fillDemo(role) {
            document.getElementById('username').value = role === 'admin' ? 'admin' : role === 'operator' ? 'operator' : 'viewer';
            document.getElementById('password').value = role === 'admin' ? 'admin123' : role === 'operator' ? 'oper123' : 'view123';
        }
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const demoAccounts = { admin: { username: 'admin', password: 'admin123' }, operator: { username: 'operator', password: 'oper123' }, viewer: { username: 'viewer', password: 'view123' } };
            const activeRole = document.querySelector('.role-option.active').dataset.role;
            if (username === demoAccounts[activeRole].username && password === demoAccounts[activeRole].password) {
                const roleNames = { admin: '管理员', operator: '运维人员', viewer: '查看者' };
                const roleTitles = { admin: '系统管理员', operator: '运维工程师', viewer: '数据查看者' };
                localStorage.setItem('qoc_user', JSON.stringify({ role: activeRole, name: roleNames[activeRole], title: roleTitles[activeRole], avatar: roleNames[activeRole].charAt(0) }));
                window.location.href = 'index.html';
            } else {
                alert('用户名或密码错误');
            }
        });
    </script>
</body>
</html>
