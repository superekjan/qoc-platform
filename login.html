<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖北QoC平台 - 系统登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050810;
            --bg-secondary: #0a0f1a;
            --bg-tertiary: #0d1526;
            --bg-card: rgba(10, 20, 40, 0.9);
            --border-color: rgba(0, 200, 255, 0.2);
            --border-glow: rgba(0, 200, 255, 0.4);
            --text-primary: #e8f4ff;
            --text-secondary: #7aa2cc;
            --text-muted: #4a6a8a;
            --accent-cyan: #00d4ff;
            --accent-blue: #0088ff;
            --accent-green: #00ff88;
            --accent-purple: #a855f7;
            --accent-yellow: #ffd000;
            --accent-red: #ff3366;
            --glow-cyan: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 136, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        .login-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), var(--glow-cyan);
            position: relative;
            z-index: 1;
        }
        .login-left {
            flex: 1;
            padding: 60px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(0, 136, 255, 0.02));
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .login-left::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .brand {
            position: relative;
            z-index: 1;
        }
        .brand h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .brand p {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        .features {
            margin-top: 48px;
            position: relative;
            z-index: 1;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(0, 212, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .feature-item:hover {
            background: rgba(0, 212, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.2);
            transform: translateX(8px);
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .feature-icon.cyan { background: rgba(0, 212, 255, 0.15); }
        .feature-icon.purple { background: rgba(168, 85, 247, 0.15); }
        .feature-icon.green { background: rgba(0, 255, 136, 0.15); }
        .feature-icon svg {
            width: 24px;
            height: 24px;
        }
        .feature-icon.cyan svg { stroke: var(--accent-cyan); }
        .feature-icon.purple svg { stroke: var(--accent-purple); }
        .feature-icon.green svg { stroke: var(--accent-green); }
        .feature-text h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .feature-text p {
            font-size: 12px;
            color: var(--text-muted);
        }
        .login-right {
            width: 420px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        .role-option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-option:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.3);
        }
        .role-option.active {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        .role-option svg {
            width: 28px;
            height: 28px;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            transition: all 0.3s;
        }
        .role-option:hover svg,
        .role-option.active svg {
            stroke: var(--accent-cyan);
        }
        .role-option span {
            font-size: 12px;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .role-option:hover span,
        .role-option.active span {
            color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: #000;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .demo-accounts {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }
        .demo-accounts > p {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-align: center;
        }
        .demo-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .demo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .demo-item:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.2);
        }
        .demo-role {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .demo-account {
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="login-container">
        <div class="login-left">
            <div class="brand">
                <h1>湖北QoC平台</h1>
                <p>城域网质量分析系统</p>
            </div>
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon cyan">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    </div>
                    <div class="feature-text">
                        <h3>实时监控分析</h3>
                        <p>全网OLT设备状态实时监控</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon purple">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </div>
                    <div class="feature-text">
                        <h3>智能故障溯源</h3>
                        <p>AI驱动的端到端故障定位</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="feature-text">
                        <h3>快速故障处置</h3>
                        <p>1510机制保障SLA达标</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-header">
                <h2>欢迎登录</h2>
                <p>请选择角色并输入账号信息</p>
            </div>
            <div class="role-selector">
                <button class="role-option active" data-role="admin" onclick="selectRole('admin')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span>管理员</span>
                </button>
                <button class="role-option" data-role="operator" onclick="selectRole('operator')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span>运维人员</span>
                </button>
                <button class="role-option" data-role="viewer" onclick="selectRole('viewer')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>查看者</span>
                </button>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">账号</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入账号" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-login">登 录</button>
            </form>
            <div class="demo-accounts">
                <p>演示账号</p>
                <div class="demo-list">
                    <div class="demo-item" onclick="fillDemo('admin')">
                        <span class="demo-role">管理员</span>
                        <span class="demo-account">admin / admin123</span>
                    </div>
                    <div class="demo-item" onclick="fillDemo('operator')">
                        <span class="demo-role">运维人员</span>
                        <span class="demo-account">operator / oper123</span>
                    </div>
                    <div class="demo-item" onclick="fillDemo('viewer')">
                        <span class="demo-role">查看者</span>
                        <span class="demo-account">viewer / view123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let selectedRole = 'admin';

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-option').forEach(opt => {
                opt.classList.remove('active');
            });
            document.querySelector(`[data-role="${role}"]`).classList.add('active');
        }

        function fillDemo(role) {
            selectRole(role);
            document.getElementById('username').value = role === 'admin' ? 'admin' : role === 'operator' ? 'operator' : 'viewer';
            document.getElementById('password').value = role === 'admin' ? 'admin123' : role === 'operator' ? 'oper123' : 'view123';
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if ((selectedRole === 'admin' && username === 'admin' && password === 'admin123') ||
                (selectedRole === 'operator' && username === 'operator' && password === 'oper123') ||
                (selectedRole === 'viewer' && username === 'viewer' && password === 'view123')) {
                window.location.href = 'index.html';
            } else {
                alert('账号或密码错误');
            }
        }
    </script>
</body>
</html>
