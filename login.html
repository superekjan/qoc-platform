<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 湖北QoC平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050810;
            --bg-secondary: #0a0f1a;
            --bg-tertiary: #0d1526;
            --bg-card: rgba(10, 20, 40, 0.8);
            --bg-card-hover: rgba(15, 30, 60, 0.9);
            --border-color: rgba(0, 200, 255, 0.15);
            --border-glow: rgba(0, 200, 255, 0.4);
            --text-primary: #e8f4ff;
            --text-secondary: #7aa2cc;
            --text-muted: #4a6a8a;
            --accent-cyan: #00d4ff;
            --accent-blue: #0088ff;
            --accent-purple: #a855f7;
            --accent-green: #00ff88;
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .login-left {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            overflow: hidden;
        }
        .login-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }
        .login-left-content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }
        .brand {
            margin-bottom: 60px;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow-cyan);
            position: relative;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            opacity: 0.3;
            filter: blur(15px);
            z-index: -1;
        }
        .brand-icon svg {
            width: 32px;
            height: 32px;
            stroke: #000;
            stroke-width: 2;
            fill: none;
        }
        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .brand span {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .hero-text h2 {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-text p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 420px;
        }
        .features {
            display: flex;
            gap: 32px;
            margin-top: 48px;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feature-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent-cyan);
            stroke-width: 1.5;
            fill: none;
        }
        .feature span {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .login-right {
            width: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
        }
        .login-right::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--accent-cyan), transparent);
            opacity: 0.3;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h3 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 14px;
            color: var(--text-muted);
        }
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 6px;
        }
        .role-option {
            flex: 1;
            padding: 14px 16px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }
        .role-option svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.5;
            fill: none;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .role-option:hover {
            color: var(--text-secondary);
        }
        .role-option:hover svg {
            opacity: 0.8;
        }
        .role-option.active {
            background: var(--bg-card);
            color: var(--accent-cyan);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .role-option.active svg {
            opacity: 1;
            filter: drop-shadow(0 0 6px currentColor);
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            fill: none;
            transition: stroke 0.3s;
        }
        .form-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }
        .form-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan), inset 0 0 30px rgba(0, 212, 255, 0.03);
            background: var(--bg-card-hover);
        }
        .form-input:focus + svg {
            stroke: var(--accent-cyan);
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .password-toggle svg {
            position: static;
            transform: none;
            width: 20px;
            height: 20px;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            fill: none;
            transition: stroke 0.3s;
        }
        .password-toggle:hover svg {
            stroke: var(--text-secondary);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .remember-me input {
            display: none;
        }
        .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .checkbox-custom svg {
            width: 14px;
            height: 14px;
            stroke: var(--accent-cyan);
            stroke-width: 3;
            fill: none;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s;
        }
        .remember-me input:checked + .checkbox-custom {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
        }
        .remember-me input:checked + .checkbox-custom svg {
            opacity: 1;
            transform: scale(1);
        }
        .remember-me span {
            font-size: 13px;
            color: var(--text-muted);
        }
        .forgot-link {
            font-size: 13px;
            color: var(--accent-cyan);
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .forgot-link:hover {
            opacity: 0.8;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: #e5faff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        .login-btn:hover {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }
        .login-btn:hover::before {
            left: 100%;
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .demo-accounts {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }
        .demo-accounts p {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .demo-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .demo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(0, 212, 255, 0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .demo-item:hover {
            background: rgba(0, 212, 255, 0.08);
            transform: translateX(4px);
        }
        .demo-role {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .demo-account {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: var(--glow-cyan); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.5); }
        }
        .brand-icon {
            animation: float 4s ease-in-out infinite, pulse-glow 3s ease-in-out infinite;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-card {
            animation: fadeInUp 0.6s ease-out;
        }
        .login-left-content {
            animation: fadeInUp 0.8s ease-out;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }
    </style>
</head>
<body>
    <div class="login-left">
        <div class="login-left-content">
            <div class="brand">
                <div class="brand-logo">
                    <div class="brand-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    </div>
                    <div>
                        <h1>HUBEI QoC</h1>
                        <span>城域网质量分析系统</span>
                    </div>
                </div>
            </div>
            <div class="hero-text">
                <h2>智能化网络质量分析与优化平台</h2>
                <p>整合多维度数据源，实现城域网质量实时监控、智能诊断与自动化优化，提升运维效率与用户满意度。</p>
            </div>
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    </div>
                    <span>实时监控</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </div>
                    <span>智能诊断</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    </div>
                    <span>快速处置</span>
                </div>
            </div>
        </div>
    </div>
    <div class="login-right">
        <div class="login-card">
            <div class="login-header">
                <h3>欢迎回来</h3>
                <p>请选择您的角色并登录系统</p>
            </div>
            <div class="role-selector">
                <button class="role-option active" data-role="admin">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span>管理员</span>
                </button>
                <button class="role-option" data-role="operator">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span>运维人员</span>
                </button>
                <button class="role-option" data-role="viewer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>查看者</span>
                </button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="请输入密码">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <div class="checkbox-custom">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>
            <div class="demo-accounts">
                <p>演示账号</p>
                <div class="demo-list">
                    <div class="demo-item" onclick="fillDemo('admin')">
                        <span class="demo-role">管理员</span>
                        <span class="demo-account">admin / admin123</span>
                    </div>
                    <div class="demo-item" onclick="fillDemo('operator')">
                        <span class="demo-role">运维人员</span>
                        <span class="demo-account">operator / oper123</span>
                    </div>
                    <div class="demo-item" onclick="fillDemo('viewer')">
                        <span class="demo-role">查看者</span>
                        <span class="demo-account">viewer / view123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }
        function fillDemo(role) {
            const roleOptions = document.querySelectorAll('.role-option');
            roleOptions.forEach(opt => opt.classList.remove('active'));
            document.querySelector(`[data-role="${role}"]`).classList.add('active');
            document.getElementById('username').value = role === 'admin' ? 'admin' : role === 'operator' ? 'operator' : 'viewer';
            document.getElementById('password').value = role === 'admin' ? 'admin123' : role === 'operator' ? 'oper123' : 'view123';
        }
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const demoAccounts = {
                admin: { username: 'admin', password: 'admin123' },
                operator: { username: 'operator', password: 'oper123' },
                viewer: { username: 'viewer', password: 'view123' }
            };
            const activeRole = document.querySelector('.role-option.active').dataset.role;
            if (username === demoAccounts[activeRole].username && password === demoAccounts[activeRole].password) {
                const roleNames = { admin: '管理员', operator: '运维人员', viewer: '查看者' };
                const roleTitles = { admin: '系统管理员', operator: '运维工程师', viewer: '数据查看者' };
                localStorage.setItem('qoc_user', JSON.stringify({
                    role: activeRole,
                    name: roleNames[activeRole],
                    title: roleTitles[activeRole],
                    avatar: roleNames[activeRole].charAt(0)
                }));
                window.location.href = 'index.html';
            } else {
                alert('用户名或密码错误');
            }
        });
        const roleOptions = document.querySelectorAll('.role-option');
        roleOptions.forEach(option => {
            option.addEventListener('click', () => {
                roleOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
            });
        });
    </script>
</body>
</html>
